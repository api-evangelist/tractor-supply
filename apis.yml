aid: tractor-supply
name: Tractor Supply
description: >-
  Tractor Supply Company is the largest rural lifestyle retailer in the United
  States, providing products to support recreational farming, ranching, and
  country lifestyles. Tractor Supply integrates with suppliers and vendors via
  EDI and vendor portal systems, enabling order management, invoice processing,
  and shipment notifications. The company operates through its vendor
  transaction portal for supplier collaboration and EDI-based supply chain
  integrations.
